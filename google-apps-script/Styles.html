<style>

.metric span { color: var(--muted); font-size: 13px; font-weight: 650; }
.metric strong { display: block; margin-top: 8px; font-size: 36px; font-weight: 620; letter-spacing: 0; }

.metric-category {

.panel-header {

  color: #4f6900;

  font-weight: 560;
}

.scan-primary, .scan-side, .manage-card {
  display: grid;
  align-content: start;

  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 16px;

label { color: var(--muted); font-size: 13px; font-weight: 520; }

  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 12px;
  background: #ffffff;
  color: var(--ink);

  box-shadow: 0 0 0 3px rgba(11, 167, 221, 0.18);

.barcode-input { min-height: 70px; font-size: 30px; font-weight: 500; }

.item-preview, .message {

.primary, .secondary, .danger {

.secondary { border: 1px solid var(--line); background: #ffffff; color: var(--ink); }
.danger { border: 0; background: var(--red); color: #ffffff; }

  grid-template-columns: repeat(2, minmax(260px, 1fr));
  gap: 16px;
  padding: 18px;

.manage-card h4 { margin: 0 0 4px; font-size: 18px; font-weight: 560; }

.removed-log {

  gap: 12px;
  margin: 0 18px 18px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 16px;
  background: #fffaf2;
}

.removed-log h4 { margin: 0; font-size: 18px; font-weight: 560; }

.summary-wrap {
  padding: 18px;
  overflow: auto;
}

.summary-table {
  max-width: 760px;
  min-width: 560px;
  border-collapse: separate;
  border-spacing: 0;
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
}

.summary-table th,
.summary-table td {
  border-bottom: 1px solid var(--line);
  text-align: right;
}

.summary-table th {
  position: static;
  background: #f4efe6;
  color: var(--ink);
  font-weight: 650;
  text-transform: none;
}

.summary-table tr:last-child td { border-bottom: 0; }

.summary-table tbody tr:nth-child(even) { background: #fff7e8; }

.summary-table td:first-child {
  text-align: left;
  font-weight: 600;
}

.summary-table .summary-in { color: var(--green); font-weight: 650; }

.summary-table .summary-out { color: var(--amber); font-weight: 650; }

.summary-table .summary-total { color: var(--ink); font-weight: 650; }

.print-controls { display: flex; gap: 10px; min-width: min(420px, 100%); }

.label-sheet {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap: 12px;
  padding: 18px;
  max-height: calc(100vh - 270px);
  overflow: auto;
}

.barcode-label {
  display: grid;
  gap: 8px;
  min-height: 138px;

.barcode-label div {

.barcode-label strong { font-size: 18px; font-weight: 560; }

.label-sheet.mini { grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); }

.message { margin: 0 18px 18px; }
.table-search { max-width: 320px; }
.table-wrap { max-height: calc(100vh - 270px); overflow: auto; }
.table-wrap.compact { max-height: 260px; }

table { width: 100%; min-width: 760px; border-collapse: collapse; }
th, td { padding: 12px 14px; border-bottom: 1px solid var(--line); text-align: left; }
th {
  position: sticky;
  top: 0;
  background: #f4efe6;
  color: var(--ink);
  font-size: 12px;
  font-weight: 560;
  text-transform: uppercase;
}

.filter-row th {
  top: 41px;
  padding: 8px;
  background: #fff7e8;
  text-transform: none;
}

.filter-row input {
  min-width: 110px;
  padding: 8px 9px;
  border-radius: 6px;
  font-size: 12px;
}

.filter-row select {

  padding: 8px 9px;
  border-radius: 6px;
  font-size: 12px;
}

.badge {

  min-width: 84px;
  min-height: 28px;
  align-items: center;
  justify-content: center;
  border-radius: 999px;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 560;
}

.badge.in { background: #eef8c7; color: #4f6900; }
.badge.out { background: #fff1c7; color: var(--amber); }
.badge.removed { background: #ffe3df; color: var(--red); }

  .sidebar { min-height: auto; }
  .nav, .metrics, .scan-grid, .manage-grid { grid-template-columns: 1fr; }
  .panel-header, .actions, .print-controls { flex-direction: column; align-items: stretch; }
}

@media print {

  }

  .label-sheet.mini .barcode-label span, .label-sheet.mini .barcode-label p { font-size: 3.5pt; }
  .label-sheet.mini .barcode-svg { height: 3.6mm; }
}
</style>
